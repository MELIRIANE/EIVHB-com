<!DOCTYPE html>
<html lang="fr">
<head>

<title>EIVHB Com' — Calendrier &amp; Générateur</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Work+Sans:wght@400;500;600&display=swap');

:root{
  --blue:#1B4EA8;
  --blue-dark:#0F2E63;
  --blue-darker:#0A2049;
  --red:#C41E3A;
  --gold:#FFD700;
  --bg:#F4F5F8;
  --surface:#FFFFFF;
  --ink:#1A1F2B;
  --muted:#68707F;
  --line:#E2E5EC;
  --radius:10px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:'Work Sans', sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
h1,h2,h3,.disp{ font-family:'Barlow Condensed', sans-serif; font-weight:700; letter-spacing:0.01em; }
.court-line{
  height:1px;
  background:repeating-linear-gradient(90deg, var(--gold) 0 10px, transparent 10px 18px);
  margin:0;
}
#app{ max-width:1180px; margin:0 auto; }
@media (min-width:1500px){
  #app{ max-width:1560px; }
  .gen-layout{ grid-template-columns:400px 1fr !important; }
  .cal-day{ min-height:120px; }
}

/* header */
.topbar{
  background:linear-gradient(180deg, var(--blue-darker), var(--blue-dark));
  color:#fff;
  padding:22px 28px 0;
  border-radius:0 0 16px 16px;
}
.topbar-inner{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; padding-bottom:16px; }
.brand{ display:flex; align-items:center; gap:12px; }
.crest{
  width:42px; height:42px; border-radius:50%;
  background:var(--blue);
  border:2px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-family:'Barlow Condensed', sans-serif; font-weight:700; font-size:15px; color:#fff;
}
.brand-name{ font-size:24px; line-height:1; text-transform:uppercase; }
.brand-sub{ font-size:12px; color:#B9C6E6; font-family:'Work Sans'; font-weight:400; margin-top:2px; }
.tabs{ display:flex; gap:4px; }
.tab-btn{
  font-family:'Barlow Condensed', sans-serif;
  font-size:16px; font-weight:600; text-transform:uppercase; letter-spacing:0.03em;
  background:transparent; border:none; color:#9FB1D9;
  padding:10px 18px; cursor:pointer; border-radius:8px 8px 0 0;
  transition:color .15s, background .15s;
}
.tab-btn.active{ color:#fff; background:rgba(255,255,255,0.08); }
.tab-btn:hover{ color:#fff; }

main{ padding:24px 20px 60px; }

/* buttons */
button{ font-family:'Work Sans', sans-serif; cursor:pointer; }
.btn{
  border:1px solid var(--line); background:var(--surface); color:var(--ink);
  padding:9px 16px; border-radius:8px; font-size:14px; font-weight:500;
  display:inline-flex; align-items:center; gap:6px;
}
.btn:hover{ border-color:var(--blue); }
.btn-primary{ background:var(--blue); color:#fff; border-color:var(--blue); }
.btn-primary:hover{ background:var(--blue-dark); }
.btn-gold{ background:var(--gold); color:var(--blue-darker); border-color:var(--gold); font-weight:600; }
.btn-gold:hover{ filter:brightness(0.95); }
.btn-ghost{ background:transparent; border:none; color:var(--muted); padding:4px 8px; }
.btn-ghost:hover{ color:var(--red); }
.btn-sm{ padding:5px 10px; font-size:12px; }

input, select, textarea{
  font-family:'Work Sans', sans-serif; font-size:14px;
  border:1px solid var(--line); border-radius:8px; padding:9px 11px;
  background:#fff; color:var(--ink); width:100%;
}
input:focus, select:focus, textarea:focus{ outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(27,78,168,0.12); }
textarea{ resize:vertical; }
.resizable-textarea{ resize:vertical; min-height:120px; font-family:'Work Sans', sans-serif; line-height:1.5; }
label{ font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.03em; display:block; margin-bottom:6px; }

/* ===== CALENDAR VIEW ===== */
.cal-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
.cal-nav{ display:flex; align-items:center; gap:10px; }
.cal-month-label{ font-size:26px; text-transform:capitalize; min-width:220px; }
.legend{ display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--muted); }
.legend span{ display:inline-flex; align-items:center; gap:5px; }
.dot{ width:9px; height:9px; border-radius:50%; display:inline-block; }
.dot-fb{ background:var(--blue); }
.dot-ig{ background:var(--red); }
.dot-wa{ background:#1DA851; }
.dot-site{ background:#7A5AF8; }
.dot-nl{ background:var(--blue-darker); }
.header-actions{ display:flex; gap:8px; flex-wrap:wrap; }

.cal-grid{
  display:grid; grid-template-columns:repeat(7, 1fr);
  gap:6px;
  background:var(--surface);
  border-radius:14px; padding:14px; border:1px solid var(--line);
}
.cal-dow{ text-align:center; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; padding-bottom:6px; }
.cal-day{
  min-height:96px; border-radius:8px; border:1px solid var(--line);
  padding:6px; background:#FAFBFD; cursor:pointer; position:relative;
  display:flex; flex-direction:column; gap:3px;
}
.cal-day:hover{ border-color:var(--blue); }
.cal-day.outside{ opacity:0.35; }
.cal-day.today{ border-color:var(--gold); border-width:2px; }
.cal-daynum{ font-size:12px; font-weight:600; color:var(--muted); }
.cal-pill{
  font-size:10.5px; padding:3px 6px; border-radius:5px; color:#fff;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  display:flex; align-items:center; gap:4px;
}
.cal-pill.status-idee{ opacity:0.55; }
.cal-pill.status-brouillon{ border:1px dashed rgba(255,255,255,0.6); }
.add-day-btn{ align-self:flex-end; opacity:0; font-size:16px; color:var(--blue); background:none; border:none; line-height:1; }
.cal-day:hover .add-day-btn{ opacity:1; }

/* list fallback mobile */
.mobile-list{ display:none; }
@media (max-width:720px){
  .cal-grid{ display:none; }
  .mobile-list{ display:flex; flex-direction:column; gap:8px; }
  .ml-item{ background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:10px 12px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
}

/* week view */
.week-grid{ display:grid; grid-template-columns:repeat(7, 1fr); gap:8px; }
@media (max-width:860px){ .week-grid{ grid-template-columns:1fr; } }
.week-day{ background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:10px; min-height:120px; }
.week-day.today{ border-color:var(--gold); border-width:2px; }
.week-day-head{ display:flex; align-items:center; justify-content:space-between; gap:6px; font-size:12.5px; font-weight:600; margin-bottom:8px; }

/* kpi */
.kpi-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:12px; }
.kpi-cell{ background:#FAFBFD; border:1px solid var(--line); border-radius:8px; padding:10px; }
.kpi-readonly{ font-size:20px; font-weight:600; font-family:'Barlow Condensed'; color:var(--blue); }

/* modal */
.overlay{ position:fixed; inset:0; background:rgba(10,20,40,0.5); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px; }
.modal{ background:#fff; border-radius:14px; padding:24px; width:100%; max-width:440px; max-height:88vh; overflow-y:auto; }
.modal.wide{ max-width:600px; }
.modal h3{ margin:0 0 16px; font-size:22px; }
.field{ margin-bottom:14px; }
.modal-actions{ display:flex; justify-content:space-between; margin-top:20px; }
.chip-row{ display:flex; gap:8px; flex-wrap:wrap; }
.chip{
  border:1px solid var(--line); border-radius:20px; padding:6px 13px; font-size:13px; cursor:pointer; background:#fff; color:var(--muted);
}
.chip.selected{ background:var(--blue); color:#fff; border-color:var(--blue); }

/* ideas modal */
.idea-row{ border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:10px; }
.idea-row .idea-title{ font-weight:500; font-size:14px; }
.idea-row .hint{ margin-top:3px; }

/* ===== GENERATOR VIEW ===== */
.gen-layout{ display:grid; grid-template-columns:360px 1fr; gap:22px; align-items:start; }
.gen-layout > div{ min-width:0; }
@media (max-width:860px){ .gen-layout{ grid-template-columns:1fr; } }
.card{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:20px; min-width:0; }
.card canvas{ max-width:100%; height:auto; }
.card + .card{ margin-top:18px; }
.preset-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.preset-btn{
  text-align:left; border:1px solid var(--line); background:#FAFBFD; border-radius:8px; padding:9px 10px;
  font-size:12.5px; font-weight:500; color:var(--ink);
}
.preset-btn.active{ border-color:var(--red); background:#FDEEF0; color:var(--red); }
.result-card{ border:1px solid var(--line); border-radius:12px; margin-bottom:16px; overflow:hidden; }
.result-head{ padding:10px 16px; display:flex; align-items:center; justify-content:space-between; font-family:'Barlow Condensed'; font-weight:600; font-size:16px; text-transform:uppercase; letter-spacing:0.02em; color:#fff; }
.result-head.fb{ background:var(--blue); }
.result-head.ig{ background:var(--red); }
.result-head.wa{ background:#1DA851; }
.result-head.site{ background:#7A5AF8; }
.result-body{ padding:14px 16px; font-size:14px; line-height:1.55; white-space:pre-wrap; }
.result-foot{ padding:0 16px 14px; display:flex; gap:8px; flex-wrap:wrap; }
.empty-state{ text-align:center; padding:60px 20px; color:var(--muted); }
.empty-state i{ font-size:30px; display:block; margin-bottom:10px; color:var(--line); }
.loading-line{ display:flex; align-items:center; gap:10px; color:var(--muted); font-size:14px; padding:20px 0; }
.spinner{ width:16px; height:16px; border-radius:50%; border:2px solid var(--line); border-top-color:var(--blue); animation:spin 0.8s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }
.hint{ font-size:12px; color:var(--muted); margin-top:6px; }

/* images / visuels */
.upload-row{ display:flex; gap:8px; align-items:flex-end; margin-bottom:14px; flex-wrap:wrap; }
.upload-row > div{ flex:1; min-width:130px; }
.thumb-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(72px,1fr)); gap:8px; }
.thumb{ position:relative; border:2px solid var(--line); border-radius:8px; overflow:hidden; cursor:pointer; aspect-ratio:1; background:#FAFBFD; }
.thumb.selected{ border-color:var(--gold); box-shadow:0 0 0 2px var(--gold) inset; }
.thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
.thumb-label{ position:absolute; bottom:0; left:0; right:0; background:rgba(10,20,40,0.72); color:#fff; font-size:9px; padding:2px 4px; text-align:center; }
.thumb-del{ position:absolute; top:2px; right:2px; background:rgba(10,20,40,0.7); color:#fff; border:none; border-radius:50%; width:16px; height:16px; font-size:10px; line-height:1; }
.selected-image-banner{ display:flex; align-items:center; gap:8px; background:#FFFBEA; border:1px solid var(--gold); border-radius:8px; padding:6px 10px; font-size:12px; margin-bottom:12px; }
.selected-image-banner img{ width:24px; height:24px; object-fit:cover; border-radius:4px; }

/* match builder logos */
.logo-pair{ display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.logo-slot{ flex:1; text-align:center; background:#FAFBFD; border:1px solid var(--line); border-radius:10px; padding:10px; }
.logo-preview{ width:56px; height:56px; object-fit:contain; margin:8px auto; display:block; }
.logo-placeholder{ width:56px; height:56px; margin:8px auto; display:flex; align-items:center; justify-content:center; border:1px dashed var(--line); border-radius:8px; font-size:10px; color:var(--muted); text-align:center; }
.logo-vs{ font-family:'Barlow Condensed'; font-weight:700; color:var(--muted); font-size:14px; }

/* history */
.history-item{ border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px; cursor:pointer; }
.history-item:hover{ border-color:var(--blue); }
.history-head{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
.history-title{ font-weight:500; font-size:13.5px; }
.history-meta{ font-size:11px; color:var(--muted); margin-top:2px; }
.badge{ font-size:10px; padding:2px 7px; border-radius:10px; color:#fff; }
.section-toggle{ display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
.section-toggle .chev{ transition:transform .15s; color:var(--muted); }
.section-toggle.open .chev{ transform:rotate(90deg); }
</style>

const STORAGE_PREFIX = 'eivhbcom_';
function hasNativeStorage(){ return typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function'; }
async function storageGet(key){
  if(hasNativeStorage()){
    try{ return await storageGet(key); }catch(e){ /* fall through to local */ }
  }
  try{
    const raw = localStorage.getItem(STORAGE_PREFIX+key);
    return raw !== null ? { key, value: raw } : null;
  }catch(e){ return null; }
}
async function storageSet(key, value){
  if(hasNativeStorage()){
    try{ return await storageSet(key, value); }catch(e){ /* fall through to local */ }
  }
  try{ localStorage.setItem(STORAGE_PREFIX+key, value); return { key, value }; }catch(e){ return null; }
}

function parseExcelDate(val){
  if(val === undefined || val === null || val === '') return null;
  if(typeof val === 'number'){
    const d = XLSX.SSF.parse_date_code(val);
    if(!d) return null;
    return new Date(d.y, d.m-1, d.d);
  }
  const s = String(val).trim();
  let m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if(m){ let y = parseInt(m[3],10); if(y<100) y+=2000; return new Date(y, parseInt(m[2],10)-1, parseInt(m[1],10)); }
  const d2 = new Date(s);
  return isNaN(d2.getTime()) ? null : d2;
}

function handlePlayersExcelFile(e){
  const file = e.target.files[0];
  if(!file) return;
  if(typeof XLSX === 'undefined'){ alert("La librairie de lecture Excel n'a pas pu se charger. Vérifie ta connexion et réessaie."); return; }
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const wb = XLSX.read(ev.target.result, { type:'binary', cellDates:false });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval:'' });
      const players = [];
      rows.forEach(row=>{
        const keys = Object.keys(row);
        const prenomKey = keys.find(k=>/pr[eé]nom|nom/i.test(k)) || keys[0];
        const dateKey = keys.find(k=>/date|naissance|né/i.test(k)) || keys[1];
        const prenom = String(row[prenomKey]||'').trim();
        const dateVal = parseExcelDate(row[dateKey]);
        if(prenom && dateVal) players.push({ prenom, date: fmtDate(dateVal) });
      });
      if(players.length===0){ alert("Aucune ligne valide trouvée. Vérifie que le fichier a bien une colonne prénom et une colonne date de naissance."); return; }
      state.playersList = players;
      savePlayersList();
      render();
      alert(`${players.length} licencié(s) importé(s) avec succès.`);
    }catch(err){
      console.error(err);
      alert("Impossible de lire ce fichier. Vérifie que c'est bien un fichier Excel (.xlsx).");
    }
  };
  reader.readAsBinaryString(file);
}

function fmtDate(d){ return d.toISOString().slice(0,10); }
function sanitizeJsonText(text){
  let out = '';
  let inString = false;
  let escaped = false;
  for(let i=0;i<text.length;i++){
    const ch = text[i];
    if(inString){
      if(escaped){ out += ch; escaped = false; continue; }
      if(ch === '\\'){ out += ch; escaped = true; continue; }
      if(ch === '\n'){ out += '\\n'; continue; }
      if(ch === '\r'){ out += '\\r'; continue; }
      if(ch === '\t'){ out += '\\t'; continue; }
      if(ch === '"'){
        let j = i+1;
        while(j<text.length && /\s/.test(text[j])) j++;
        const nextCh = text[j];
        if(nextCh === undefined || nextCh === ',' || nextCh === '}' || nextCh === ']' || nextCh === ':'){
          out += ch;
          inString = false;
        } else {
          out += '\\"';
        }
        continue;
      }
      out += ch;
    } else {
      if(ch === '"'){ inString = true; out += ch; continue; }
      out += ch;
    }
  }
  out = out.replace(/,(\s*[}\]])/g, '$1');
  return out;
}

function parseAIJson(rawText){
  let clean = rawText.trim().replace(/^```json/,'').replace(/^```/,'').replace(/```$/,'').trim();
  try{
    return JSON.parse(clean);
  }catch(e){
    try{
      return JSON.parse(sanitizeJsonText(clean));
    }catch(e2){
      console.error('JSON repair failed', e2, clean);
      throw e2;
    }
  }
}

function getFinalChannelText(resultsObj, channel){
  const obj = resultsObj && resultsObj[channel];
  if(!obj) return '';
  if(obj._edited !== undefined) return obj._edited;
  if(channel==='facebook') return (obj.texte||'') + (obj.hashtags && obj.hashtags.length ? '\n\n'+obj.hashtags.join(' ') : '');
  if(channel==='instagram') return (obj.accroche?obj.accroche+'\n\n':'') + (obj.legende||'') + (obj.hashtags && obj.hashtags.length ? '\n\n'+obj.hashtags.join(' ') : '') + (obj.idee_story?'\n\nIdée story : '+obj.idee_story:'');
  if(channel==='whatsapp') return obj.texte||'';
  if(channel==='site') return (obj.titre?obj.titre+'\n\n':'') + (obj.texte||'');
  return '';
}

function buildCalendarDays(viewDate){
  const year = viewDate.getFullYear(); const month = viewDate.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  let startOffset = firstOfMonth.getDay() - 1; if(startOffset < 0) startOffset = 6;
  const gridStart = new Date(year, month, 1 - startOffset);
  const days = [];
  for(let i=0;i<42;i++){ const d = new Date(gridStart); d.setDate(gridStart.getDate()+i); days.push(d); }
  return days;
}

  const rows = [["Mois","Publications","Portée","Interactions","Nouveaux abonnés","Clics","Licenciés recrutés","Participation événements"]];

  months.forEach(mk=>{
    const [y,m] = mk.split('-');
    const label = MONTHS[parseInt(m,10)-1] + ' ' + y;

    const pubCount = state.items.filter(it=>{ const d=new Date(it.date); return monthKey(d)===mk && it.status==='publie'; }).length;

  rows.push(["TOTAL SAISON", "", totals.portee, totals.interactions, totals.abonnes, totals.clics, totals.licencies, totals.participation]);

  const csv = '\uFEFF' + rows.map(r=>r.map(csvEscape).join(',')).join('\r\n');

  const url = URL.createObjectURL(blob);

    try{
      const data = JSON.parse(ev.target.result);
      const ok = confirm("Restaurer cette sauvegarde va remplacer toutes les données actuelles (calendrier, historique, visuels, KPI). Continuer ?");
      if(!ok) return;
      state.items = data.items || [];

function csvEscape(v){
  const s = (v===undefined || v===null) ? '' : String(v);
  if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}

function suggestVisualIdea(it){
  const t = (it.title||'').toLowerCase();
  if(/match|résultat|resultat|score|calendrier/.test(t)) return "Photo de match";
  if(/entraînement|entrainement|technique|exercice/.test(t)) return "Photo d'entraînement";
  if(/recrutement|inscription|forum/.test(t)) return "Photo d'inscription / forum";
  if(/anniversaire/.test(t)) return "Photo souvenir / groupe";
  if(/bénévole|benevole|remerciement|coup de main/.test(t)) return "Photo des bénévoles";
  if(/partenaire/.test(t)) return "Logo du partenaire";
  if(/portrait/.test(t)) return "Portrait individuel";
  if(/défi|defi|jeu|quiz/.test(t)) return "Visuel ludique / graphique";
  if(/événement|evenement|loto|galette|assemblée|assemblee/.test(t)) return "Photo de l'événement";
  return "";
}

function exportMonthPlanningSheet(){
  const month = state.viewDate.getMonth(); const year = state.viewDate.getFullYear();
  const items = state.items.filter(it=>{ const d=new Date(it.date); return d.getMonth()===month && d.getFullYear()===year; })
    .sort((a,b)=>a.date.localeCompare(b.date));

  const rows = [["Date du post","Titre","Canaux","Contenu","Idée de visuel","Hashtags","Statut"]];
  items.forEach(it=>{
    const d = new Date(it.date);
    const dateStr = String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
    const canaux = (it.channels||[]).map(c=>CHANNEL_META[c]?.label||c).join(', ');
    const hashtags = it.hashtags || ((it.content||'').match(/#[\wÀ-ÿ]+/g) || []).join(' ');
    const contenuBrut = (it.content && it.content.trim() !== (it.title||'').trim()) ? it.content : '';
    const contenu = contenuBrut.replace(/#[\wÀ-ÿ]+/g, '').replace(/\n{3,}/g,'\n\n').trim();

function buildPostPrompts(preset, channels, details){
  const channelInstructions = channels.map(c=>{
    if(c==='facebook') return `"facebook": {"texte": "post complet avec sauts de ligne", "hashtags": ["#..."], "cta": "..."}`;
    if(c==='instagram') return `"instagram": {"accroche": "1re ligne courte", "legende": "légende complète", "hashtags": ["#..."], "idee_story": "..."}`;
    if(c==='whatsapp') return `"whatsapp": {"texte": "moins de 300 caractères, avec emoji titre et CTA"}`;
    if(c==='site') return `"site": {"titre": "titre d'article", "texte": "article complet pour la page actualités du site club, plus détaillé et informatif qu'un post réseau social, 3 à 6 phrases", "meta_description": "résumé en une phrase pour le référencement"}`;
  }).join(',\n');

  const systemPrompt = `Tu es le community manager du club de handball amateur ${CLUB.nom} (${CLUB.sigle}), basé à ${CLUB.villes}, gymnase ${CLUB.gymnase}.
Identité du club : couleurs ${CLUB.couleurs}. Valeurs : ${CLUB.valeurs}. Ton : ${CLUB.ton}.
Tu rédiges du contenu prêt à publier pour un club amateur familial, jamais générique ni corporate.
Réponds UNIQUEMENT avec un objet JSON valide, sans texte avant ni après, sans balises markdown, au format exact suivant :
{
${channelInstructions}
}`;
  const multiMatchHint = preset === "Calendrier des matchs (semaine)"
    ? "\nLes détails listent probablement plusieurs matchs (une ligne par match : catégorie, adversaire, date, heure, lieu, domicile/extérieur). Structure le texte pour lister chaque match clairement (catégorie en gras ou en majuscule, puis infos), sans en oublier aucun."
    : "";
  const resultatsHint = preset === "Résultats du week-end"
    ? "\nLes détails listent probablement plusieurs matchs avec leur score (une ligne par match : catégorie, adversaire, score, date, lieu, domicile/extérieur). Reprends chaque résultat sans en oublier aucun, en signalant clairement victoire/nul/défaite selon le score."
    : "";
  const conseilDuMoisHint = preset === "Conseil du mois"
    ? "\nCe n'est pas un conseil technique d'entraînement : vise un thème plus large utile aux familles et licenciés (hydratation, sommeil, alimentation, préparation mentale, sécurité, matériel, vie de club, règlement...). Choisis un thème pertinent si aucun n'est précisé dans les détails."
    : "";
  const defiHint = preset === "Défi / Jeu / Quiz handball"
    ? "\nPropose un contenu interactif et engageant : un défi à relever, un mini-jeu, ou un quiz avec une question à choix (ex. règle du hand, anecdote du club, chiffre) et sa réponse. Donne envie de commenter ou de répondre en story."
    : "";
  const userPrompt = `Type de contenu : ${preset}
Détails fournis par la responsable communication : ${details || "(aucun détail supplémentaire, improvise de façon plausible et générique pour un club de handball amateur)"}${multiMatchHint}${resultatsHint}${conseilDuMoisHint}${defiHint}`;

  return { systemPrompt, userPrompt };
}

async function callGenerateAPI(preset, channels, details){
  const { systemPrompt, userPrompt } = buildPostPrompts(preset, channels, details);
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, system: systemPrompt, messages: [{ role:"user", content:userPrompt }] })
  });
  const data = await response.json();
  const textBlock = (data.content||[]).find(b=>b.type==='text');
  if(!textBlock) throw new Error("Pas de réponse texte");
  return parseAIJson(textBlock.text);
}

  if(!state.genPreset){ state.genError = "Choisis un type de contenu."; render(); return; }

  let parsed = null;
  try{
    parsed = await callGenerateAPI(state.genPreset, channels, state.genDetails);

  }catch(e){

function getNewsletterSections(nl){
  const sections = [];
  if(nl.mot_du_club) sections.push({ key:'mot_du_club', label:'Le mot du club', text: nl.mot_du_club });
  if(nl.evenement_special) sections.push({ key:'evenement_special', label: nl.evenement_special.titre||'Événement du mois',
    text: [nl.evenement_special.texte, nl.evenement_special.date?('Date : '+nl.evenement_special.date):'', ...(nl.evenement_special.programme||[]).map(p=>'• '+p)].filter(Boolean).join('\n') });
  if(nl.sommaire && nl.sommaire.length) sections.push({ key:'sommaire', label:'Au sommaire', text: nl.sommaire.map(s=>'• '+s).join('\n') });
  if(nl.resultats){
    let t = (nl.resultats.intro||'') + '\n';
    if(nl.chiffre_du_mois) t += `\nChiffre du mois — ${nl.chiffre_du_mois.label} : ${nl.chiffre_du_mois.valeur}\n`;
    (nl.resultats.equipes||[]).forEach(eq=>{
      t += `\n${eq.nom} — ${eq.bilan}\n`;
      (eq.matchs||[]).forEach(m=> t += `${m.score} vs ${m.adversaire}\n`);
      if(eq.commentaire) t += `${eq.commentaire}\n`;
    });
    sections.push({ key:'resultats', label:'Résultats & classement', text: t.trim() });
  }
  if(nl.matchs_a_venir && nl.matchs_a_venir.length){
    sections.push({ key:'matchs_a_venir', label:'Matchs à venir', text: nl.matchs_a_venir.map(m=>`${m.categorie} — ${m.date} à ${m.heure} vs ${m.adversaire} — ${m.domicile?'🏠 ':''}${m.lieu}`).join('\n') });
  }
  if(nl.coulisses) sections.push({ key:'coulisses', label:'Les coulisses du club', text: nl.coulisses.texte });
  if(nl.le_saviez_vous) sections.push({ key:'le_saviez_vous', label:'Le saviez-vous ?', text: [nl.le_saviez_vous.question, ...(nl.le_saviez_vous.points||[]).map(p=>'• '+p)].filter(Boolean).join('\n') });
  if(nl.portrait_du_mois) sections.push({ key:'portrait_du_mois', label:'Portrait du mois — '+nl.portrait_du_mois.titre, text: [((nl.portrait_du_mois.noms||[]).join(', ')), nl.portrait_du_mois.texte].filter(Boolean).join('\n') });
  if(nl.statistiques_officielles && nl.statistiques_officielles.length) sections.push({ key:'statistiques_officielles', label:'Statistiques officielles', text: nl.statistiques_officielles.map(s=>'• '+s.label+' : '+s.valeur).join('\n') });
  if(nl.defi_fair_play && nl.defi_fair_play.length) sections.push({ key:'defi_fair_play', label:'Défi fair-play du mois', text: nl.defi_fair_play.map(d=>'• '+d).join('\n') });
  if(nl.valeurs_club && nl.valeurs_club.length) sections.push({ key:'valeurs_club', label:'Valeurs EIVHB', text: nl.valeurs_club.join(' • ') });
  if(nl.coup_de_main) sections.push({ key:'coup_de_main', label:'Coup de main du mois', text: nl.coup_de_main.texte });
  if(nl.partenaire_du_mois) sections.push({ key:'partenaire_du_mois', label:'Partenaire du mois — '+nl.partenaire_du_mois.nom, text: [nl.partenaire_du_mois.texte, nl.partenaire_du_mois.cta].filter(Boolean).join('\n') });
  if(nl.agenda_condense && nl.agenda_condense.length) sections.push({ key:'agenda_condense', label:'À venir le mois prochain', text: nl.agenda_condense.map(a=>a.date+' — '+a.titre).join('\n') });
  if(nl.sondage) sections.push({ key:'sondage', label:'Votre avis nous intéresse', text: [nl.sondage.question, ...(nl.sondage.options||[]).map(o=>'• '+o), nl.sondage.cta].filter(Boolean).join('\n') });
  if(nl.anniversaires_du_mois) sections.push({ key:'anniversaires_du_mois', label:'Anniversaires du mois', text: nl.anniversaires_du_mois.texte });
  return sections;
}

async function processQueue(){
  if(state.genQueue.length===0) return;
  state.batchLoading = true; state.batchError = null; state.batchResults = [];
  const total = state.genQueue.length;
  render();

  for(let i=0;i<total;i++){
    const q = state.genQueue[i];
    state.batchProgress = `${i+1}/${total} — ${q.preset}`;
    render();
    try{
      const parsed = await callGenerateAPI(q.preset, q.channels, q.details);
      state.batchResults.push({ id:q.id, preset:q.preset, channels:q.channels, imageId:q.imageId, results:parsed, error:null });
      state.history.unshift({
        id: 'hist_' + Date.now() + '_' + i,
        timestamp: new Date().toISOString(),
        preset: q.preset, channels: q.channels, details: q.details, results: parsed, imageId: q.imageId
      });
    }catch(e){
      state.batchResults.push({ id:q.id, preset:q.preset, channels:q.channels, results:null, error:"Échec de la génération" });
      console.error(e);
    }
  }
  saveHistory();
  state.genQueue = [];
  state.batchProgress = null;
  state.batchLoading = false;
  render();
}

function roundedLogoDraw(ctx, img, cx, cy, r){
  if(!img) return;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.closePath();
  ctx.fillStyle = '#FFFFFF';
  ctx.fill();
  ctx.clip();
  const scale = Math.max((r*2)/img.width, (r*2)/img.height);
  const w = img.width*scale, h = img.height*scale;
  ctx.drawImage(img, cx-w/2, cy-h/2, w, h);
  ctx.restore();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#FFD700';
  ctx.stroke();
}

function drawExtraPhotosRow(ctx, W, H, photoConfigs, loadedImgs){
  photoConfigs.forEach((cfg, i)=>{
    const img = loadedImgs[i];
    if(!img) return;
    const size = cfg.size;
    const cx = (cfg.x/100)*W;
    const cy = (cfg.y/100)*H;
    const x = cx - size/2, y = cy - size/2;
    ctx.save();
    ctx.beginPath();
    const r=10;
    ctx.moveTo(x+r,y); ctx.arcTo(x+size,y,x+size,y+size,r); ctx.arcTo(x+size,y+size,x,y+size,r); ctx.arcTo(x,y+size,x,y,r); ctx.arcTo(x,y,x+size,y,r);
    ctx.closePath(); ctx.clip();
    const scale = Math.max(size/img.width, size/img.height);
    const w=img.width*scale, h=img.height*scale;
    ctx.drawImage(img, x+(size-w)/2, y+(size-h)/2, w, h);
    ctx.restore();
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2;
    ctx.strokeRect(x,y,size,size);
  });
}

function wrapLinesForMeasure(ctx, text, maxWidth){
  const paragraphs = (text||'').split('\n');
  let lines = [];
  paragraphs.forEach(p=>{
    if(p.trim()===''){ lines.push(''); return; }
    const words = p.split(/\s+/).filter(Boolean);
    let line = '';
    words.forEach(w=>{
      const test = line ? line+' '+w : w;
      if(ctx.measureText(test).width > maxWidth && line){ lines.push(line); line = w; }
      else line = test;
    });
    if(line) lines.push(line);
  });
  return lines;
}

function drawBackdrop(ctx, W, H, bg){
  if(bg){
    const scale = Math.max(W/bg.width, H/bg.height);
    const w = bg.width*scale, h = bg.height*scale;
    const fx = (state.matchVisual.bgX!==undefined ? state.matchVisual.bgX : 50) / 100;
    const fy = (state.matchVisual.bgY!==undefined ? state.matchVisual.bgY : 50) / 100;
    const x = (W-w)*fx, y = (H-h)*fy;
    ctx.drawImage(bg, x, y, w, h);
    ctx.fillStyle = 'rgba(10,32,73,0.55)';
    ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle = '#0F2E63';
    ctx.fillRect(0,0,W,H);
  }
}

function drawPageHeader(ctx, W, H, eivhbImg, title, pageNum){
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  let y = H*0.08;
  if(eivhbImg){
    const r = W*0.095;
    roundedLogoDraw(ctx, eivhbImg, W/2, y+r, r);
    y += r*2 + 28;
  }
  ctx.fillStyle = '#FFD700';
  const titleSize = state.visualStyle.titleSize;
  ctx.font = `700 ${titleSize}px Barlow Condensed, sans-serif`;
  const fullTitle = pageNum===1 ? title : title + ' (suite)';
  const lineHeight = titleSize + 6;
  const lines = wrapText(ctx, fullTitle, W/2, y, W*0.85, lineHeight, 2);
  y += (lines-1)*lineHeight + 46;
  ctx.strokeStyle = 'rgba(255,215,0,0.5)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(W*0.25, y); ctx.lineTo(W*0.75, y); ctx.stroke();
  y += 46;
  return y;
}

function parseOutcomeColor(score){
  if(!score) return '#B9C6E6';
  const parts = score.split(/[-–]/).map(s=>parseInt(s.trim(),10));
  if(parts.length!==2 || isNaN(parts[0]) || isNaN(parts[1])) return '#B9C6E6';
  if(parts[0] > parts[1]) return '#4CD97B';
  if(parts[0] < parts[1]) return '#E24B4A';
  return '#FAC775';
}

async function buildMultiMatchPages(title, mode){
  const isSquare = state.matchVisual.format === 'square';
  const W = 1080, H = isSquare ? 1080 : 1920;
  const [bg, eivhbImg, ...extraImgs] = await Promise.all([
    loadImg(state.matchVisual.background),
    loadImg(state.eivhbLogo),
    ...state.visualExtraPhotos.map(p=>loadImg(p.src))
  ]);
  const caption = getCaptionText();
  const bodySize = state.visualStyle.bodySize;

  const measure = newOffscreenCanvas(10,10).getContext('2d');
  measure.font = `400 ${bodySize}px Work Sans, sans-serif`;
  const captionLines = caption ? wrapLinesForMeasure(measure, caption, W*0.8) : [];

  const matches = state.matchBuilderList;
  const bottomLimit = H*0.86;
  const pages = [];
  let matchIdx = 0, captionIdx = 0, pageNum = 0;

  while(true){
    pageNum++;
    const canvas = newOffscreenCanvas(W,H);
    const ctx = canvas.getContext('2d');
    drawBackdrop(ctx, W, H, bg);
    let y = drawPageHeader(ctx, W, H, eivhbImg, title, pageNum);

    if(matches.length===0 && pageNum===1 && !caption){
      ctx.fillStyle = '#B9C6E6';
      ctx.font = `400 ${bodySize+4}px Work Sans, sans-serif`;
      ctx.fillText('Ajoute des matchs ci-dessus pour les voir apparaître ici', W/2, H/2);
    }

    ctx.textAlign = 'left';
    const rowH = 150;
    while(matchIdx < matches.length && y+rowH <= bottomLimit){
      const m = matches[matchIdx];
      const dotColorHex = mode === 'results' ? parseOutcomeColor(m.score) : (m.domicile ? '#FFD700' : '#B9C6E6');
      ctx.fillStyle = dotColorHex;
      ctx.beginPath(); ctx.arc(W*0.12, y+rowH*0.38, 13, 0, Math.PI*2); ctx.fill();

      ctx.fillStyle = '#FFD700';
      ctx.font = `600 ${bodySize+2}px Barlow Condensed, sans-serif`;
      ctx.fillText(m.categorie.toUpperCase(), W*0.18, y+rowH*0.2);

      ctx.fillStyle = '#FFFFFF';
      ctx.font = `700 ${bodySize+18}px Barlow Condensed, sans-serif`;
      const middleLabel = mode === 'results' ? (m.score ? m.score : 'vs') : 'vs';
      ctx.fillText(`EIVHB  ${middleLabel}  ${m.adversaire}`, W*0.18, y+rowH*0.52);

      ctx.fillStyle = '#B9C6E6';
      ctx.font = `400 ${bodySize-3}px Work Sans, sans-serif`;
      const infoParts = mode === 'results'
        ? [m.lieu, m.domicile?'domicile':'extérieur']
        : [m.date ? new Date(m.date).toLocaleDateString('fr-FR', {day:'numeric', month:'short'}) : '', m.heure, m.lieu, m.domicile?'🏠 domicile':'extérieur'];
      ctx.fillText(infoParts.filter(Boolean).join(' · '), W*0.18, y+rowH*0.82);

      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(W*0.08, y+rowH-10); ctx.lineTo(W*0.92, y+rowH-10); ctx.stroke();

      y += rowH;
      matchIdx++;
    }

    if(matchIdx >= matches.length && captionLines.length){
      if(captionIdx===0){
        y += 16;
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(W*0.1, y); ctx.lineTo(W*0.9, y); ctx.stroke();
        y += 50;
      }
      ctx.fillStyle = '#FFFFFF';
      ctx.font = `400 ${bodySize}px Work Sans, sans-serif`;
      const lineHeight = 46;
      while(captionIdx < captionLines.length && y+lineHeight <= bottomLimit){
        ctx.fillText(captionLines[captionIdx], W*0.1, y);
        y += lineHeight;
        captionIdx++;
      }
    }

    ctx.textAlign = 'center';
    if(pageNum===1) drawExtraPhotosRow(ctx, W, H, state.visualExtraPhotos, extraImgs);
    pages.push(canvas.toDataURL('image/png'));

    if(matchIdx >= matches.length && captionIdx >= captionLines.length) break;
    if(pageNum >= 10) break;
  }
  return pages;
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines){
  const words = (text||'').split(/\s+/).filter(Boolean);
  let line = '';
  let lines = [];
  for(let i=0;i<words.length;i++){
    const test = line ? line + ' ' + words[i] : words[i];
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = words[i];
      if(lines.length >= maxLines) break;
    } else {
      line = test;
    }
  }
  if(line && lines.length < maxLines) lines.push(line);
  if(lines.length === maxLines && words.length > 0){
    const last = lines[lines.length-1];
    lines[lines.length-1] = last.replace(/\s*\S*$/, '') + '…';
  }
  lines.forEach((l,i)=> ctx.fillText(l, x, y + i*lineHeight));
  return lines.length;
}

async function buildGenericPages(){
  const isSquare = state.matchVisual.format === 'square';
  const W = 1080, H = isSquare ? 1080 : 1920;
  const [bg, eivhbImg, diagramImg, ...extraImgs] = await Promise.all([
    loadImg(state.matchVisual.background),
    loadImg(state.eivhbLogo),
    (state.genPreset === "Conseil technique / entraînement") ? loadImg(getExerciseDiagramDataUrl()) : Promise.resolve(null),
    ...state.visualExtraPhotos.map(p=>loadImg(p.src))
  ]);
  const titre = (state.genericVisualTitle || state.genPreset || 'EIVHB').toUpperCase();
  const titleSize = state.visualStyle.titleSize;
  const bodySize = state.visualStyle.bodySize;

  const measure = newOffscreenCanvas(10,10).getContext('2d');
  measure.font = `500 ${bodySize}px Work Sans, sans-serif`;
  const infoBlocks = state.genericInfoList.length
    ? state.genericInfoList.map(info=>wrapLinesForMeasure(measure, info.text, W*0.7))
    : [];
  measure.font = `400 ${bodySize}px Work Sans, sans-serif`;
  const captionLines = !state.genericInfoList.length ? wrapLinesForMeasure(measure, (state.genDetails||'').trim(), W*0.78) : [];
  const caption = getCaptionText();
  measure.font = `400 ${bodySize-2}px Work Sans, sans-serif`;
  const postCaptionLines = caption ? wrapLinesForMeasure(measure, caption, W*0.8) : [];

  const bottomLimit = H*0.86;
  const pages = [];
  let infoIdx = 0, subIdx = 0, captionIdx = 0, pageNum = 0;

  while(true){
    pageNum++;
    const canvas = newOffscreenCanvas(W,H);
    const ctx = canvas.getContext('2d');
    drawBackdrop(ctx, W, H, bg);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    let y = H*0.09;

    if(pageNum===1){
      const logoR = W*0.13;
      if(eivhbImg){ roundedLogoDraw(ctx, eivhbImg, W/2, y+logoR, logoR); }
      y += logoR*2 + 40;
      ctx.strokeStyle = 'rgba(255,215,0,0.6)';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(W*0.25, y); ctx.lineTo(W*0.75, y); ctx.stroke();
      y += 60;
      ctx.fillStyle = '#FFD700';
      ctx.font = `700 ${titleSize}px Barlow Condensed, sans-serif`;
      const titleLines = wrapText(ctx, titre, W/2, y, W*0.82, titleSize+4, 2);
      y += titleLines*(titleSize+4) + 30;

      if(diagramImg){
        const diagW = W*0.7;
        const diagH = diagW * (120/200);
        ctx.drawImage(diagramImg, (W-diagW)/2, y, diagW, diagH);
        y += diagH + 34;
      }
    } else {
      const logoR = W*0.07;
      if(eivhbImg){ roundedLogoDraw(ctx, eivhbImg, W/2, y+logoR, logoR); }
      y += logoR*2 + 24;
      ctx.fillStyle = '#FFD700';
      ctx.font = `700 ${Math.round(titleSize*0.63)}px Barlow Condensed, sans-serif`;
      ctx.fillText(titre + ' (suite)', W/2, y);
      y += 60;
    }

    ctx.textAlign = 'left';

    if(infoBlocks.length){
      while(infoIdx < infoBlocks.length && y+50 <= bottomLimit){
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.arc(W*0.14, y, 9, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.font = `500 ${bodySize}px Work Sans, sans-serif`;
        const block = infoBlocks[infoIdx];
        let placed = 0;
        for(const line of block){
          if(y+50 > bottomLimit) break;
          ctx.fillText(line, W*0.19, y);
          y += bodySize+14;
          placed++;
        }
        if(placed === block.length){ infoIdx++; y += 18; }
        else break;
      }
    } else if(captionLines.length){
      ctx.fillStyle = '#FFFFFF';
      ctx.font = `400 ${bodySize}px Work Sans, sans-serif`;
      while(subIdx < captionLines.length && y+(bodySize+12) <= bottomLimit){
        ctx.fillText(captionLines[subIdx], W*0.11, y);
        y += bodySize+12;
        subIdx++;
      }
    }

    const introDone = infoBlocks.length ? infoIdx >= infoBlocks.length : subIdx >= captionLines.length;
    if(introDone && postCaptionLines.length){
      if(captionIdx===0){
        y += 14;
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(W*0.1, y); ctx.lineTo(W*0.9, y); ctx.stroke();
        y += 48;
      }
      ctx.fillStyle = '#FFFFFF';
      ctx.font = `400 ${bodySize-2}px Work Sans, sans-serif`;
      while(captionIdx < postCaptionLines.length && y+(bodySize+10) <= bottomLimit){
        ctx.fillText(postCaptionLines[captionIdx], W*0.1, y);
        y += bodySize+10;
        captionIdx++;
      }
    }

    ctx.textAlign = 'center';
    if(pageNum===1 && !infoBlocks.length && !captionLines.length && !postCaptionLines.length){
      ctx.fillStyle = '#B9C6E6';
      ctx.font = '500 30px Work Sans, sans-serif';
      ctx.fillText('EIVHB — Entente Igny-Vauhallan Handball', W/2, H*0.94);
    }

    if(pageNum===1) drawExtraPhotosRow(ctx, W, H, state.visualExtraPhotos, extraImgs);
    pages.push(canvas.toDataURL('image/png'));

    const infoDone = infoBlocks.length ? infoIdx >= infoBlocks.length : subIdx >= captionLines.length;
    if(infoDone && captionIdx >= postCaptionLines.length) break;
    if(pageNum >= 10) break;
  }
  return pages;
}

function getWeekDays(viewDate){
  const d = new Date(viewDate);
  const dow = d.getDay();
  const offset = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(d);
  monday.setDate(d.getDate() + offset);
  const days = [];
  for(let i=0;i<7;i++){ const day = new Date(monday); day.setDate(monday.getDate()+i); days.push(day); }
  return days;
}

function renderMonthGrid(){
  const days = buildCalendarDays(state.viewDate);
  const month = state.viewDate.getMonth();
  const today = todayStr();

  const dayCells = days.map(d=>{
    const ds = fmtDate(d);
    const outside = d.getMonth() !== month;
    const isToday = ds === today;
    const dayItems = state.items.filter(it=>it.date===ds);
    const pills = dayItems.map(it=>{
      const ch = it.channels[0] || 'facebook';
      return `<div class="cal-pill status-${it.status}" draggable="true" ondragstart="handlePillDragStart(event,'${it.id}')" style="background:${dotColor(ch)}; cursor:grab;" onclick="event.stopPropagation(); openModalFromCell('${it.id}')">${escapeHtml(it.title)}</div>`;
    }).join('');
    return `<div class="cal-day ${outside?'outside':''} ${isToday?'today':''}" onclick="openModalNew('${ds}')" ondragover="event.preventDefault()" ondrop="handleDayDrop(event,'${ds}')">
      <div style="display:flex; justify-content:space-between;">
        <span class="cal-daynum">${d.getDate()}</span>
        <button class="add-day-btn" onclick="event.stopPropagation(); openModalNew('${ds}')">+</button>
      </div>
      ${pills}
    </div>`;
  }).join('');

  const listItems = state.items
    .filter(it=>{ const d=new Date(it.date); return d.getMonth()===month && d.getFullYear()===state.viewDate.getFullYear(); })
    .sort((a,b)=>a.date.localeCompare(b.date))
    .map(it=>`<div class="ml-item" onclick="openModalFromCell('${it.id}')">
      <div><strong>${escapeHtml(it.title)}</strong><div class="hint">${it.date} · ${STATUS_LABEL[it.status]}</div></div>
      <span class="dot ${CHANNEL_META[it.channels[0]]?.dot||''}"></span>

  return `
    <div class="cal-grid">
      ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${dayCells}
    </div>
    <div class="mobile-list">${listItems}</div>
  `;
}

function handleDayDrop(e, newDate){

  }

function generateWeekTemplate(){
  const weekDays = getWeekDays(state.viewDate);
  const plan = [
    { idx:0, title:"Résultats du week-end", channels:["facebook","instagram"] },
    { idx:2, title:"Annonce des matchs du week-end", channels:["facebook","instagram"] },
    { idx:4, title:"Teasing / motivation avant le week-end", channels:["instagram"] }
  ];
  let added = 0;
  plan.forEach(p=>{
    const ds = fmtDate(weekDays[p.idx]);
    const exists = state.items.some(it=>it.date===ds);
    if(!exists){
      state.items.push({
        id: 'item_' + Date.now() + '_' + Math.floor(Math.random()*1000) + '_' + p.idx,
        date: ds, title: p.title, channels: p.channels, status: 'idee', content: '', includeInNewsletter: false
      });
      added++;
    }
  });
  if(added===0){ alert("Cette semaine a déjà du contenu sur les jours de la trame (lundi/mercredi/vendredi)."); }
  saveItems();
  render();
}

async function suggestModalIdea(){
  const it = state.editingItem;
  if(!it || !it.date) return;
  state.modalIdeaLoading = true; render();
  const d = new Date(it.date);
  const hint = DAY_HINTS[d.getDay()] || "vie du club";
  const dateLabel = d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });

  const systemPrompt = `Tu es le community manager du club de handball amateur ${CLUB.nom} (${CLUB.sigle}). Ton : ${CLUB.ton}.
Réponds UNIQUEMENT avec un objet JSON valide, sans texte avant/après, sans markdown :
{"titre":"...", "canaux":["facebook","instagram"], "idee_visuel":"courte description du visuel/photo à utiliser", "hashtags":["#..","#.."]}`;
  const userPrompt = `Propose une idée de publication concrète pour le ${dateLabel}.
D'après la trame hebdomadaire du club, ce jour est plutôt orienté vers : ${hint}.
Le titre doit être court et concret (pas générique type "contenu du jour"). Le titre ne doit JAMAIS contenir de hashtag ni de description de visuel — ces informations vont dans les champs séparés "idee_visuel" et "hashtags".`;

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 300, system: systemPrompt, messages: [{ role:"user", content:userPrompt }] })
    });
    const data = await response.json();
    const textBlock = (data.content||[]).find(b=>b.type==='text');
    if(!textBlock) throw new Error('no text');
    const parsed = parseAIJson(textBlock.text);
    if(state.editingItem){
      state.editingItem.title = parsed.titre || state.editingItem.title;
      if(parsed.canaux && parsed.canaux.length) state.editingItem.channels = parsed.canaux;
      if(parsed.idee_visuel) state.editingItem.visualIdea = parsed.idee_visuel;
      if(parsed.hashtags && parsed.hashtags.length) state.editingItem.hashtags = parsed.hashtags.join(' ');
    }
  }catch(e){
    console.error(e);
  }
  state.modalIdeaLoading = false; render();
}

  if(channels.length===0) channels = ['facebook'];
  state.modalGenLoading = true; render();
  try{
    const parsed = await callGenerateAPI(it.title || "Publication du club", channels, details);
    let combined = '';
    let allHashtags = [];
    if(parsed.facebook){ combined += `[Facebook]\n${parsed.facebook.texte}\n\n`; if(parsed.facebook.hashtags) allHashtags.push(...parsed.facebook.hashtags); }
    if(parsed.instagram){ combined += `[Instagram]\n${parsed.instagram.accroche||''}\n${parsed.instagram.legende||''}\n\n`; if(parsed.instagram.hashtags) allHashtags.push(...parsed.instagram.hashtags); }
    if(parsed.whatsapp) combined += `[WhatsApp]\n${parsed.whatsapp.texte}\n\n`;
    if(parsed.site) combined += `[Site web]\n${parsed.site.titre}\n${parsed.site.texte}\n\n`;
    if(state.editingItem){
      state.editingItem.content = combined.trim();
      if(allHashtags.length) state.editingItem.hashtags = Array.from(new Set(allHashtags)).join(' ');
    }
    state.history.unshift({ id:'hist_'+Date.now(), timestamp:new Date().toISOString(), preset: it.title || 'Idée manuelle', channels, details, results: parsed });
    saveHistory();
  }catch(e){
    alert("La génération a échoué. Réessaie.");
    console.error(e);
  }
  state.modalGenLoading = false; render();
}

function pullFromHistoryForMonth(){
  const sel = document.getElementById('nl-month-select');
  const mk = sel ? sel.value : state.nlMonth;
  state.nlMonth = mk;
  const entries = state.history.filter(h=> h.timestamp && monthKey(new Date(h.timestamp)) === mk);

  const resultsText = entries.filter(h=>h.preset==="Résultats du week-end" && h.details).map(h=>h.details).join('\n');
  const matchsText = entries.filter(h=>(h.preset==="Annonce d'un match" || h.preset==="Calendrier des matchs (semaine)") && h.details).map(h=>h.details).join('\n');

  const calendarItems = state.items.filter(it=>{
    const d = new Date(it.date);
    return monthKey(d) === mk && it.includeInNewsletter === true;
  });
  const eventsText = calendarItems.map(it=>`• ${it.title}${it.content && it.content.trim()!==it.title.trim() ? ' — '+it.content.trim().slice(0,140) : ''}`).join('\n');

  if(resultsText) state.nl.resultatsBrut = resultsText;
  if(matchsText) state.nl.matchsBrut = matchsText;
  if(eventsText){
    const prefix = "Événements du mois signalés pour la newsletter (à intégrer dans le mot du club et/ou les coulisses) :\n";
    state.nl.contexte = state.nl.contexte ? state.nl.contexte + '\n\n' + prefix + eventsText : prefix + eventsText;
  }
  if(!resultsText && !matchsText && !eventsText){
    alert("Aucun résultat, match ou événement coché pour la newsletter n'a été trouvé pour ce mois. Génère d'abord des posts, ou coche 'Inclure dans la newsletter' sur tes contenus du calendrier.");
  }
  render();
}

function reuseNewsletterEntry(id){
  const entry = state.history.find(h=>h.id===id);
  if(!entry) return;
  state.tab = 'generator';
  state.genMode = 'newsletter';
  state.nlResults = entry.results;
  state.nlEditedSections = {};
  render();
}

async function regenerateNlSection(key){
  const sections = getNewsletterSections(state.nlResults);
  const section = sections.find(s=>s.key===key);
  if(!section) return;
  const currentText = getEditedSectionText(section);
  state.nlSectionRegenLoading = key; render();

  const systemPrompt = `Tu es le community manager du club de handball amateur ${CLUB.nom} (${CLUB.sigle}). Ton : ${CLUB.ton}.
Tu réécris/améliores UNE section d'une newsletter déjà générée, sans changer les faits (scores, dates, noms) qu'elle contient.
Réponds UNIQUEMENT avec un objet JSON valide : {"texte":"nouvelle version de la section"}`;
  const userPrompt = `Section : "${section.label}"
Texte actuel de cette section :
${currentText}

Propose une nouvelle version, un peu différente dans la formulation (plus vivante ou mieux structurée), en conservant exactement les mêmes informations factuelles (aucun chiffre, nom ou date inventé).`;

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 800, system: systemPrompt, messages: [{ role:"user", content:userPrompt }] })
    });
    const data = await response.json();
    const textBlock = (data.content||[]).find(b=>b.type==='text');
    if(!textBlock) throw new Error('no text');
    const parsed = parseAIJson(textBlock.text);
    if(parsed.texte) state.nlEditedSections[key] = parsed.texte;
  }catch(e){
    alert("La régénération a échoué. Réessaie.");
    console.error(e);
  }
  state.nlSectionRegenLoading = null;
  render();
}

function renderNewsletterResults(){
  const nl = state.nlResults;
  const sections = getNewsletterSections(nl);

  let html = `<div class="hint" style="margin-bottom:10px;">Chaque encart ci-dessous correspond à une section de ta maquette Canva : modifie le texte si besoin, puis copie-le pour le coller directement dans le bloc correspondant.</div>`;

  html += sections.map(s=>`
    <div class="result-card">
      <div class="result-head" style="background:var(--blue-darker);"><span>${escapeHtml(s.label)}</span></div>
      <div style="padding:14px 16px;">
        <textarea class="resizable-textarea" rows="4" style="border:none; padding:0; font-size:13.5px; line-height:1.5;" oninput="state.nlEditedSections['${s.key}']=this.value">${escapeHtml(getEditedSectionText(s))}</textarea>
      </div>
      <div class="result-foot">
        <button class="btn btn-sm" onclick="copyText(getEditedSectionText(getNewsletterSections(state.nlResults).find(x=>x.key==='${s.key}')), this)">Copier cette section</button>
        <button class="btn btn-sm" ${state.nlSectionRegenLoading===s.key?'disabled':''} onclick="regenerateNlSection('${s.key}')">${state.nlSectionRegenLoading===s.key?'Régénération...':"🔄 Régénérer avec l'IA"}</button>
      </div>
    </div>
  `).join('');

  html += `<div class="card" style="margin-top:6px;">
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn btn-sm" onclick="exportNewsletterMarkdown()">Exporter tout en .md</button>
      <button class="btn btn-sm btn-primary" onclick="addNewsletterToCalendar()">Ajouter au calendrier</button>
    </div>
  </div>`;
  return html;
}

function renderResults(){
  const r = state.genResults;
  const img = state.genSelectedImageId ? state.images.find(i=>i.id===state.genSelectedImageId) : null;
  const imgThumb = img ? `<div style="padding:12px 16px 0;"><img src="${img.dataUrl}" style="max-width:120px; max-height:120px; border-radius:8px; border:1px solid var(--line); display:block;"></div>` : '';
  const fs = state.resultsFontSize;
  const editableCard = (channel, headClass, label)=>{
    if(!r[channel]) return '';
    const text = getFinalChannelText(r, channel);
    const canvaUrl = channel==='instagram' ? 'https://www.canva.com/instagram-posts/templates/'
      : channel==='facebook' ? 'https://www.canva.com/facebook-posts/templates/' : null;
    const canPublish = (channel==='facebook' || channel==='instagram');
    return `<div class="result-card">
      <div class="result-head ${headClass}"><span>${label}</span></div>
      ${imgThumb}
      <div style="padding:14px 16px;">
        <textarea class="resizable-textarea" rows="6" style="border:none; padding:0; font-size:${fs}px; line-height:1.55;" oninput="state.genResults.${channel}._edited=this.value">${escapeHtml(text)}</textarea>
      </div>
      <div class="result-foot">
        <button class="btn btn-sm" onclick="copyText(getFinalChannelText(state.genResults,'${channel}'), this)">Copier</button>
        <button class="btn btn-sm btn-primary" onclick="addResultToCalendar('${channel}')">Ajouter au calendrier</button>
        ${canvaUrl ? `<a href="${canvaUrl}" target="_blank" rel="noopener" class="btn btn-sm" style="text-decoration:none;">🎨 Construire sur Canva ↗</a>` : ''}
        ${canPublish ? `<button class="btn btn-sm ${state.makeWebhookUrl?'btn-gold':''}" ${state.publishStatus==='loading'?'disabled':''} onclick="publishViaWebhook('${channel}')">${state.publishStatus==='loading'?'Envoi...':'🚀 Publier via Make'}</button>` : ''}
      </div>
    </div>`;
  };
  let html = `<div style="display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-bottom:10px;">
    <span class="hint" style="margin:0;">Taille du texte</span>
    <button class="btn btn-sm" onclick="changeResultsFontSize(-2)">A-</button>
    <span class="hint" style="margin:0;">${fs}px</span>
    <button class="btn btn-sm" onclick="changeResultsFontSize(2)">A+</button>
  </div>`;
  if(state.publishStatus === 'success') html += `<div class="selected-image-banner" style="border-color:#4CAF50; background:#EFF6ED;"><span style="color:#2E7D32;">✅ Envoyé à Make avec succès. Vérifie que la publication apparaît bien sur le réseau visé.</span></div>`;
  if(state.publishStatus === 'error') html += `<div class="selected-image-banner" style="border-color:var(--red); background:#FDEEF0;"><span style="color:var(--red);">❌ Échec de l'envoi. Vérifie l'URL du webhook dans l'onglet "Affiches Canva".</span></div>`;
  html += editableCard('facebook', 'fb', 'Facebook');
  html += editableCard('instagram', 'ig', 'Instagram');
  html += editableCard('whatsapp', 'wa', 'WhatsApp');
  html += editableCard('site', 'site', 'Site web');
  return html;
}

function attachInputHandlers(){
  const details = document.getElementById('gen-details-input');
  if(details) details.oninput = (e)=>{ state.genDetails = e.target.value; };
  const modalContent = document.getElementById('modal-content-input');
  if(modalContent) modalContent.oninput = (e)=>{ if(state.editingItem) state.editingItem.content = e.target.value; };
  const modalVisualIdea = document.getElementById('modal-visualidea-input');
  if(modalVisualIdea) modalVisualIdea.oninput = (e)=>{ if(state.editingItem) state.editingItem.visualIdea = e.target.value; };
  const modalHashtags = document.getElementById('modal-hashtags-input');
  if(modalHashtags) modalHashtags.oninput = (e)=>{ if(state.editingItem) state.editingItem.hashtags = e.target.value; };
  const modalDate = document.getElementById('modal-date-input');
  if(modalDate){
    modalDate.oninput = (e)=>{ if(state.editingItem) state.editingItem.date = e.target.value; };
    modalDate.onchange = (e)=>{ if(state.editingItem) state.editingItem.date = e.target.value; };
  }
  const imgName = document.getElementById('img-name-input');
  if(imgName) imgName.oninput = (e)=>{ state.imageUploadName = e.target.value; };
  const genericTitle = document.getElementById('generic-visual-title');
  if(genericTitle) genericTitle.oninput = (e)=>{ state.genericVisualTitle = e.target.value; };
  const genericInfo = document.getElementById('generic-info-input');
  if(genericInfo) genericInfo.oninput = (e)=>{ state.genericInfoInput = e.target.value; };
  const imgCat = document.getElementById('img-category-input');
  if(imgCat) imgCat.onchange = (e)=>{ state.imageUploadCategory = e.target.value; };

  const bind = (id, key)=>{ const el = document.getElementById(id); if(el) el.oninput = (e)=>{ state.nl[key] = e.target.value; }; };
  bind('nl-contexte','contexte');
  bind('nl-resultats','resultatsBrut');
  bind('nl-matchs','matchsBrut');
  bind('nl-evenement','evenementSpecial');
  bind('nl-saviez','saviezVous');
  bind('nl-portrait','portraitBrut');
  bind('nl-coupdemain','coupDeMain');
  bind('nl-partenaire','partenaireDuMois');
  bind('nl-agenda','agendaSuivant');
  bind('nl-sondage','sondage');
}
